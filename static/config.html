function renderAccountDetail() {
  return '<div class="page-header"><h2>' + (editingAccount ? '编辑账号: ' + esc(editingAccount.name) : '账号详情') + '</h2></div>' +
    '<button class="back-link" onclick="accountsView=\'list\';editingAccount=null;renderAccountsPanel();">← 返回账号列表</button>' +
    '<div id="accountDetailForm"><div class="empty-state">加载中...</div></div>';
}

function renderAccountDetailForm() {
  var container = document.getElementById('accountDetailForm');
  if (!container || !editingAccount) return;

  var preset = providerPresets.find(function(p) { return p.slug === editingAccount.provider; });
  var knownModels = preset ? preset.known_models : [];

  // 准备模型映射行
  var modelEntries = [];
  var modelMap = editingAccount.model_map || {};
  Object.keys(modelMap).forEach(function(k) {
    modelEntries.push({ codex: k, upstream: modelMap[k] });
  });

  var html = '';

  // 基本信息
  html += '<div class="config-section"><div class="config-section-header"><h3>基本信息</h3></div><div class="config-fields">';

  html += '<div class="config-field">';
  html += '<label>账号名称</label>';
  html += '<input type="text" id="acctName" value="' + escAttr(editingAccount.name) + '">';
  html += '<span class="hint">账号的显示名称</span>';
  html += '</div>';

  html += '<div class="config-field">';
  html += '<label>供应商</label>';
  html += '<select id="acctProvider">';
  providerPresets.forEach(function(p) {
    html += '<option value="' + escAttr(p.slug) + '"' + (p.slug === editingAccount.provider ? ' selected' : '') + '>' + esc(p.label) + '</option>';
  });
  html += '</select>';
  html += '<span class="hint">上游 LLM 提供商</span>';
  html += '</div>';

  html += '<div class="config-field wide">';
  html += '<label>上游 API 地址</label>';
  html += '<input type="text" id="acctUpstream" value="' + escAttr(editingAccount.upstream) + '">';
  html += '<span class="hint">Chat Completions 端点 URL</span>';
  html += '</div>';

  html += '<div class="config-field">';
  html += '<label>API Key <span style="font-weight:normal;text-transform:none;">（脱敏值，不修改则不更新）</span></label>';
  html += '<input type="password" id="acctApiKey" value="' + escAttr(editingAccount.api_key || '') + '" autocomplete="off">';
  html += '<span class="hint">修改后保存才会更新密钥</span>';
  html += '</div>';

  html += '<div class="config-field wide">';
  html += '<label>视觉上游地址</label>';
  html += '<input type="text" id="acctVisionUpstream" value="' + escAttr(editingAccount.vision_upstream || '') + '">';
  html += '<span class="hint">多模态模型的 API 地址（可选）</span>';
  html += '</div>';

  html += '<div class="config-field">';
  html += '<label>视觉 API Key <span style="font-weight:normal;text-transform:none;">（脱敏值）</span></label>';
  html += '<input type="password" id="acctVisionApiKey" value="' + escAttr(editingAccount.vision_api_key || '') + '" autocomplete="off">';
  html += '<span class="hint">修改后保存才会更新（可选）</span>';
  html += '</div>';

  html += '<div class="config-field">';
  html += '<label>视觉模型名</label>';
  html += '<input type="text" id="acctVisionModel" value="' + escAttr(editingAccount.vision_model || '') + '">';
  html += '<span class="hint">使用的视觉模型名称（可选）</span>';
  html += '</div>';

  html += '<div class="config-field">';
  html += '<label>视觉端点路径</label>';
  html += '<input type="text" id="acctVisionEndpoint" value="' + escAttr(editingAccount.vision_endpoint || '') + '">';
  html += '<span class="hint">视觉 API 具体端点路径（可选）</span>';
  html += '</div>';

  html += '</div></div>';

  // 模型映射
  html += '<div class="config-section"><div class="config-section-header"><h3>模型映射</h3><span class="section-desc">' + (Object.keys(modelMap).length || 0) + ' 条</span></div>';
  html += '<div id="modelMapRows" style="padding: 0 4px;">';

  modelEntries.forEach(function(entry, idx) {
    html += renderModelRow(idx, entry.codex, entry.upstream, knownModels);
  });

  html += '</div>';
  html += '<button class="add-model-btn" onclick="addModelRow()">+ 添加映射</button>';
  html += '</div>';

  // 操作按钮
  html += '<div class="config-actions" style="margin-top:20px;display:flex;gap:10px;align-items:center;">';
  html += '<button class="btn btn-primary" id="btnUpdateAccount" onclick="doUpdateAccount()">保存修改</button>';
  html += '<button class="btn btn-danger" id="btnDeleteAccount" onclick="deleteAccountConfirm()">删除账号</button>';
  html += '<span id="accountDetailMsg" style="font-family:var(--font-mono);font-size:11px;color:var(--text-muted);align-self:center;margin-left:8px;"></span>';
  html += '</div>';

  container.innerHTML = html;
}

function renderModelRow(idx, codexModel, upstreamModel, knownModels) {
  var datalistId = 'modelDatalist_' + idx;
  var html = '<div class="model-row" id="modelRow_' + idx + '">';
  html += '<div class="model-codex">';
  html += '<select id="modelCodex_' + idx + '" style="width:100%;background:var(--bg-input);border:1px solid var(--border-subtle);color:var(--text-primary);font-family:var(--font-mono);font-size:12px;padding:5px 8px;border-radius:var(--radius-sm);">';
  CODEX_MODEL_LIST.forEach(function(m) {
    html += '<option value="' + escAttr(m) + '"' + (m === codexModel ? ' selected' : '') + '>' + esc(m) + '</option>';
  });
  // 如果当前值不在预定义列表中，添加自定义选项
  if (codexModel && CODEX_MODEL_LIST.indexOf(codexModel) === -1) {
    html += '<option value="' + escAttr(codexModel) + '" selected>' + esc(codexModel) + '</option>';
  }
  html += '</select></div>';
  html += '<div class="model-arrow">→</div>';
  html += '<div class="model-upstream">';
  html += '<input type="text" id="modelUpstream_' + idx + '" value="' + escAttr(upstreamModel || '') + '" list="' + datalistId + '" style="width:100%;" placeholder="上游模型名">';
  html += '<datalist id="' + datalistId + '">';
  knownModels.forEach(function(m) {
    html += '<option value="' + escAttr(m) + '">';
  });
  html += '</datalist></div>';
  html += '<button class="model-remove" onclick="removeModelRow(\'' + idx + '\')" title="移除">✕</button>';
  html += '</div>';
  return html;
}

// --- 模型映射行管理（动态添加/删除） ---

function addModelRow() {
  var rows = document.getElementById('modelMapRows');
  if (!rows) return;
  var idx = Date.now();
  var preset = providerPresets.find(function(p) { return p.slug === editingAccount.provider; });
  var knownModels = preset ? preset.known_models : [];
  rows.insertAdjacentHTML('beforeend', renderModelRow(idx, '', '', knownModels));
}

function removeModelRow(idx) {
  var row = document.getElementById('modelRow_' + idx);
  if (row) row.remove();
}

function collectModelMap() {
  var map = {};
  var rows = document.querySelectorAll('[id^="modelRow_"]');
  rows.forEach(function(row) {
    var idParts = row.id.split('_').slice(1).join('_');
    var select = document.getElementById('modelCodex_' + idParts);
    var input = document.getElementById('modelUpstream_' + idParts);
    if (select && input && input.value.trim()) {
      map[select.value.trim()] = input.value.trim();
    }
  });
  return map;
}

// --- 账号操作 ---

async function switchAccount(id) {
  try {
    var res = await fetch('/api/accounts/' + encodeURIComponent(id) + '/activate', { method: 'POST' });
    if (!res.ok) {
      var errData = await res.json().catch(function() { return {}; });
      throw new Error(errData.error || '切换账号失败');
    }
    await loadAccountsData();
    if (accountsView === 'list') renderAccountsPanel();
    await loadActiveAccountBanner();
    showToast('账号已切换', 'success');
  } catch (e) {
    showToast(e.message, 'error');
  }
}

async function doAddAccount(provider) {
  try {
    var preset = providerPresets.find(function(p) { return p.slug === provider; });
    var name = preset ? preset.label + ' 账号' : '新账号';
    var res = await fetch('/api/accounts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ provider: provider, name: name })
    });
    if (!res.ok) {
      var errData = await res.json().catch(function() { return {}; });
      throw new Error(errData.error || '创建账号失败');
    }
    var data = await res.json();
    showToast('账号已创建', 'success');
    await loadAccountsData();
    // 直接进入编辑
    editingAccount = data.account || accountsData.accounts.find(function(a) { return a.id === data.account.id; });
    if (!editingAccount && accountsData.accounts.length > 0) {
      editingAccount = accountsData.accounts[accountsData.accounts.length - 1];
    }
    accountsView = 'detail';
    renderAccountsPanel();
  } catch (e) {
    showToast(e.message, 'error');
  }
}

async function doUpdateAccount() {
  if (!editingAccount) return;
  var btn = document.getElementById('btnUpdateAccount');
  var msgEl = document.getElementById('accountDetailMsg');
  if (btn) btn.disabled = true;
  if (msgEl) msgEl.textContent = '保存中...';

  try {
    var body = {
      name: document.getElementById('acctName').value.trim(),
      provider: document.getElementById('acctProvider').value,
      upstream: document.getElementById('acctUpstream').value.trim(),
      model_map: collectModelMap(),
      vision_upstream: document.getElementById('acctVisionUpstream').value.trim(),
      vision_model: document.getElementById('acctVisionModel').value.trim(),
      vision_endpoint: document.getElementById('acctVisionEndpoint').value.trim()
    };

    // API Key: 仅当用户修改了脱敏值时才传
    var apiKeyInput = document.getElementById('acctApiKey').value.trim();
    if (apiKeyInput && apiKeyInput !== editingAccount.api_key && apiKeyInput !== '****') {
      body.api_key = apiKeyInput;
    }
    var visionKeyInput = document.getElementById('acctVisionApiKey').value.trim();
    if (visionKeyInput && visionKeyInput !== editingAccount.vision_api_key && visionKeyInput !== '****') {
      body.vision_api_key = visionKeyInput;
    }

    var res = await fetch('/api/accounts/' + encodeURIComponent(editingAccount.id), {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!res.ok) {
      var errData = await res.json().catch(function() { return {}; });
      throw new Error(errData.error || '保存账号失败');
    }
    var data = await res.json();
    if (data.account) {
      editingAccount = data.account;
    }
    showToast('账号已保存', 'success');
    await loadAccountsData();
    await loadActiveAccountBanner();
    if (msgEl) msgEl.textContent = '已保存';
    setTimeout(function() { if (msgEl) msgEl.textContent = ''; }, 2000);
  } catch (e) {
    showToast(e.message, 'error');
    if (msgEl) msgEl.textContent = '保存失败';
  } finally {
    if (btn) btn.disabled = false;
  }
}

function deleteAccountConfirm() {
  if (!editingAccount) return;
  showConfirm('删除账号', '确认删除账号「' + editingAccount.name + '」？此操作不可恢复，且无法删除最后一个账号。', function() {
    doDeleteAccount(editingAccount.id);
  });
}

async function doDeleteAccount(id) {
  try {
    var res = await fetch('/api/accounts/' + encodeURIComponent(id), { method: 'DELETE' });
    if (!res.ok) {
      var errData = await res.json().catch(function() { return {}; });
      throw new Error(errData.error || '删除账号失败');
    }
    showToast('账号已删除', 'success');
    editingAccount = null;
    await loadAccountsData();
    await loadActiveAccountBanner();
    accountsView = 'list';
    renderAccountsPanel();
  } catch (e) {
    showToast(e.message, 'error');
  }
}
</script>
</body>
</html>
