name: CI

on:
  push:
    branches: [main, deecodex-gui]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-targets
      - run: cargo clippy -- -D warnings
      - run: cargo fmt --check

  build-windows-gui:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install NSIS
        run: choco install nsis --version 3.10 -y --no-progress

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Tauri app without updater artifacts
        if: github.event_name == 'pull_request'
        working-directory: deecodex-gui
        run: |
          npx @tauri-apps/cli build --config '{ "bundle": { "createUpdaterArtifacts": false } }'

      - name: Build signed Tauri updater artifacts
        if: github.event_name != 'pull_request'
        working-directory: deecodex-gui
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_WINDOWS_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_WINDOWS_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if (-not $env:TAURI_SIGNING_PRIVATE_KEY) {
            throw "missing TAURI_WINDOWS_SIGNING_PRIVATE_KEY secret"
          }
          if (-not $env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD) {
            throw "missing TAURI_WINDOWS_SIGNING_PRIVATE_KEY_PASSWORD secret"
          }
          npx @tauri-apps/cli build --bundles nsis --config tauri.windows.conf.json

      - name: Upload NSIS installer and updater signature
        uses: actions/upload-artifact@v4
        with:
          name: deecodex-gui-windows-nsis-updater
          path: |
            target-local/release/bundle/nsis/*setup.exe
            target-local/release/bundle/nsis/*setup.exe.sig
