let wizardIdx = 0;
let wizardVer = '';

async function checkSetupWizard() {
  // 从服务状态获取版本，失败则从 get_config 侧面获取，再失败用已知版本
  let ver = (window._statusData && window._statusData.version) || '';
  if (ver === '—' || ver === '0.0.0' || !ver) {
    try { const st = await invoke('get_service_status'); ver = st.version; } catch (_) {}
  }
  if (!ver || ver === '0.0.0') return;
  const completedVer = localStorage.getItem('setupCompletedVersion');
  if (!completedVer || completedVer !== ver) {
    wizardVer = ver;
    wizardIdx = 0;
    showWizardBar();
  }
}

function showWizardBar() {
  const existing = document.getElementById('setupWizard');
  if (existing) existing.remove();

  const bar = document.createElement('div');
  bar.id = 'setupWizard';
  bar.style.cssText = 'position:fixed;top:0;left:268px;right:0;z-index:100;'
    + 'background:rgba(255,255,255,0.95);'
    + 'border-bottom:2px solid var(--accent);'
    + 'padding:7px 20px;display:flex;align-items:center;gap:14px;'
    + 'font-family:var(--font-mono);font-size:11px;'
    + 'box-shadow:0 2px 12px rgba(0,200,232,0.2);'
    + 'animation:wzPulse 3s ease-in-out infinite;'
    + 'color:#1a1a2e;';
  document.body.appendChild(bar);
  // 主内容区下移避免遮挡
  const main = document.getElementById('mainContent');
  if (main) main.style.paddingTop = '40px';
  renderWizardBar(bar);

  // 第一步强提醒：弹出一个醒目的 toast
  if (wizardIdx === 0) {
    showToast('✦ 欢迎！跟随顶部引导完成首次配置', 'info');
  }

  // 监听面板切换
  const origSwitch = switchPanel;
  switchPanel = function(panelId) {
    origSwitch(panelId);
    autoWizardStep(panelId);
  };
}

function autoWizardStep(panelId) {
  // 根据当前面板自动定位到相关步骤
  const bar = document.getElementById('setupWizard');
  if (!bar) return;
  let found = -1;
  for (let i = 0; i < WIZARD_STEPS.length; i++) {
    if (WIZARD_STEPS[i].panel === panelId) { found = i; break; }
  }
  if (found >= 0) { wizardIdx = found; renderWizardBar(bar); }
}

function renderWizardBar(bar) {
  const s = WIZARD_STEPS[wizardIdx];
  const isFirst = wizardIdx === 0;
  const isLast = wizardIdx === WIZARD_STEPS.length - 1;
  const pct = Math.round((wizardIdx + 1) / WIZARD_STEPS.length * 100);

  let btnHtml = '';
  if (s.quick) {
    btnHtml = '<button id="wzAct" style="flex-shrink:0;padding:3px 10px;font-size:10px;border-radius:var(--radius-sm);cursor:pointer;'
      + 'background:var(--accent-dim);border:1px solid rgba(0,200,232,0.25);color:var(--accent);font-family:var(--font-mono);">执行</button>';
  }

  // 白底用暗色文字
  const tc = '#1a1a2e'; const tc2 = '#4a5568'; const tc3 = '#718096';
  bar.innerHTML = ''
    + '<span style="color:' + tc3 + ';flex-shrink:0;font-size:10px;">' + s.icon + '</span>'
    + '<span style="color:' + tc3 + ';flex-shrink:0;font-size:10px;">' + (wizardIdx + 1) + '/' + WIZARD_STEPS.length + '</span>'
    + '<div style="flex-shrink:0;width:60px;height:2px;background:#e2e8f0;border-radius:1px;">'
    +   '<div style="width:' + pct + '%;height:100%;background:var(--accent);border-radius:1px;transition:width 300ms;"></div>'
    + '</div>'
    + '<b style="flex-shrink:0;color:' + tc + ';">' + s.title + '</b>'
    + '<span style="flex:1;color:' + tc2 + ';min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + s.desc + '</span>'
    + btnHtml
    + (!isFirst ? '<button id="wzPrev" style="flex-shrink:0;padding:3px 8px;font-size:10px;border-radius:var(--radius-sm);cursor:pointer;'
      + 'background:#e2e8f0;border:1px solid #cbd5e0;color:' + tc2 + ';font-family:var(--font-mono);">←</button>' : '')
    + (!isLast ? '<button id="wzNext" style="flex-shrink:0;padding:3px 8px;font-size:10px;border-radius:var(--radius-sm);cursor:pointer;'
      + 'background:var(--accent);border:1px solid var(--accent);color:#fff;font-family:var(--font-mono);">→</button>'
      : '<button id="wzDone" style="flex-shrink:0;padding:3px 10px;font-size:10px;border-radius:var(--radius-sm);cursor:pointer;'
      + 'background:var(--green);border:1px solid var(--green);color:#fff;font-family:var(--font-mono);">完成</button>')
    + '<button id="wzClose" style="flex-shrink:0;background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:12px;padding:2px;">×</button>';

  // 事件绑定
  document.getElementById('wzClose').onclick = () => { bar.remove(); const m = document.getElementById('mainContent'); if (m) m.style.paddingTop = ''; };
  document.getElementById('wzPrev')?.addEventListener('click', () => { if (wizardIdx > 0) { wizardIdx--; goWizardStep(); } });
  document.getElementById('wzNext')?.addEventListener('click', () => { if (wizardIdx < WIZARD_STEPS.length - 1) { wizardIdx++; wizardCheer(); goWizardStep(); } });
  document.getElementById('wzDone')?.addEventListener('click', () => {
    localStorage.setItem('setupCompletedVersion', wizardVer);
    bar.remove(); const m = document.getElementById('mainContent'); if (m) m.style.paddingTop = '';
  });

  const actBtn = document.getElementById('wzAct');
  if (actBtn) {
    actBtn.onclick = async () => {
      actBtn.disabled = true; actBtn.textContent = '...';
      try {
        if (s.quick === 'fetchUpstreamModels') {
          await invoke('fetch_upstream_models', { provider: null });
        } else if (s.quick === 'presetModelMap') {
          await presetModelMapping();
        } else if (s.quick === 'saveConfig') {
          await invoke('save_config', { config: currentConfig });
        } else if (s.quick === 'startService') {
          const st = await invoke('get_service_status');
          if (!st.running) await invoke('start_service');
          for (let j = 0; j < 30; j++) {
            await new Promise(r => setTimeout(r, 500));
            if ((await invoke('get_service_status')).running) break;
          }
          await loadStatus(); renderPanel('status');
        }
        actBtn.textContent = '✓'; actBtn.style.color = 'var(--green)'; actBtn.style.borderColor = 'var(--green)';
        wizardCheer();
      } catch (e) {
        actBtn.textContent = '✗'; actBtn.style.color = 'var(--red)'; actBtn.style.borderColor = 'var(--red)';
        actBtn.title = String(e);
        setTimeout(() => { actBtn.textContent = '重试'; actBtn.style.color = ''; actBtn.style.borderColor = ''; actBtn.disabled = false; }, 3000);
      }
    };
  }
}

function wizardCheer() {
  const cheers = ['做得不错！', '很好，继续！', '太棒了！', '又完成一步！', '厉害！', '加油，快完成了！', '完美！'];
  const msg = cheers[wizardIdx % cheers.length];
  // 短时绿色闪烁
  const bar = document.getElementById('setupWizard');
  if (bar) {
    bar.style.transition = 'background 0.3s';
    bar.style.background = 'rgba(0,214,143,0.3)';
    setTimeout(() => { bar.style.background = 'rgba(255,255,255,0.95)'; }, 600);
  }
  showToast('✓ ' + msg, 'success');
}

function goWizardStep() {
  const s = WIZARD_STEPS[wizardIdx];
  if (s.panel && s.panel !== currentPanel) switchPanel(s.panel);
  else renderWizardBar(document.getElementById('setupWizard'));
}

async function presetModelMapping() {
  // 预设 OpenAI → 上游模型映射
  const cfg = await invoke('get_config').catch(() => ({}));
  let map = {};
  try { map = JSON.parse(cfg.model_map || '{}'); } catch (_) {}
  const defaults = {
    'gpt-5.5': 'deepseek-v4-pro',
    'gpt-5': 'deepseek-v4-pro',
    'gpt-4o': 'deepseek-v4-pro',
    'gpt-4o-mini': 'deepseek-v4-pro',
    'gpt-4.1': 'deepseek-v4-pro',
    'o3-model': 'deepseek-v4-pro',
    'o4-model': 'deepseek-v4-pro',
  };
  let changed = false;
  for (const [k, v] of Object.entries(defaults)) {
    if (!map[k]) { map[k] = v; changed = true; }
  }
  if (changed) {
    await invoke('save_config', { config: { ...cfg, model_map: JSON.stringify(map) } });
  }
}

async function autoCheckUpgrade() {
  const last = localStorage.getItem('lastUpgradeCheck');
  const today = new Date().toISOString().slice(0, 10);
  if (last === today) {
    // 今天已检查过，从缓存恢复指示状态
    applyUpdateIndicator(!!localStorage.getItem('updateAvailable'));
    return;
  }

  localStorage.setItem('lastUpgradeCheck', today);
  try {
    const info = await invoke('check_upgrade');
    if (info.has_update) {
      window._updateInfo = info;
      localStorage.setItem('updateAvailable', '1');
      applyUpdateIndicator(true);
    } else {
      window._updateInfo = null;
      localStorage.removeItem('updateAvailable');
      applyUpdateIndicator(false);
    }
  } catch (_) { /* 静默失败 */ }
}

function applyUpdateIndicator(hasUpdate) {
  const logo = document.querySelector('.sidebar-brand .logo');
  const ver = document.getElementById('sidebarVersion');
  const btn = document.getElementById('btnUpdate');
  if (hasUpdate) {
    if (logo) { logo.classList.add('update-available'); logo.style.animation = 'logo-pulse-amber 3s ease-in-out infinite'; }
    if (ver && !ver.querySelector('.update-dot')) {
      const dot = document.createElement('span');
      dot.className = 'update-dot';
      ver.insertBefore(dot, ver.firstChild);
    }
    if (btn && !btn.querySelector('.update-dot')) {
      btn.insertAdjacentHTML('afterbegin', '<span class="update-dot" style="vertical-align:middle;margin-right:3px;"></span>');
    }
  } else {
    if (logo) { logo.classList.remove('update-available'); logo.style.animation = ''; }
    const dot = ver?.querySelector('.update-dot'); if (dot) dot.remove();
    const btnDot = btn?.querySelector('.update-dot'); if (btnDot) btnDot.remove();
  }
}

async function mgmtRestart() {
  if (!await showConfirm('确定要重启 deecodex 服务吗？')) return;

  const btn = document.getElementById('btnRestart');
  if (btn) btn.disabled = true;

  try {
    showToast('正在停止服务...', 'info');
    await invoke('stop_service');
    showToast('服务已停止，正在重新启动...', 'info');
    await new Promise(r => setTimeout(r, 800));
    await invoke('start_service');
    showToast('服务已重启', 'success');
  } catch (err) {
    showToast('重启失败: ' + err, 'error');

  await loadStatus();
  if (btn) btn.disabled = false;
}

      </div>`;

async function refreshLogs() {
  try {
    const lines = await invoke('get_logs');
    const container = document.getElementById('logContent');
    if (!container) return;

    if (!lines || lines.length === 0) {
      container.innerHTML = '<div class="log-empty">暂无日志</div>';
      return;
    }

    const filtered = lines.filter(l => l && l !== '(暂无日志)');
    if (filtered.length === 0) {
      container.innerHTML = '<div class="log-empty">暂无日志</div>';
      return;
    }

    // 反转：最新日志在前
    let html = '';
    for (let i = filtered.length - 1; i >= 0; i--) {
      const parsed = parseLogLine(filtered[i]);
      html += '<div class="log-entry">' +
        '<span class="log-time">' + esc(parsed.time || '') + '</span>' +
        '<span class="log-level-badge log-level-' + (parsed.level || 'unknown') + '">' + esc((parsed.level || '?').toUpperCase()) + '</span>' +
        '<span class="log-target" title="' + escAttr(parsed.target || '') + '">' + esc(parsed.target || '') + '</span>' +
        '<span class="log-msg">' + esc(parsed.message || '') + '</span>' +
        '</div>';
    }
    container.innerHTML = html || '<div class="log-empty">无匹配日志条目</div>';
  } catch (err) {
    const container = document.getElementById('logContent');
    if (container) container.innerHTML = '<div class="log-empty">无法加载日志: ' + esc(String(err)) + '</div>';
  }
}

// 解析日志行（与 web 端 parse_log_line 逻辑一致）
function parseLogLine(raw) {
  // 移除 ANSI 转义码
  const clean = raw.replace(/\x1b\[[0-9;]*m/g, '').trim();
  if (!clean) return { level: 'unknown', time: '', target: '', message: raw };

  // ISO 8601 时间戳: "2026-05-07T17:26:48.845500Z " (27 字符)
  let time = '';
  let rest = clean;
  if (clean.length >= 27 && clean[4] === '-') {
    time = clean.substring(11, 19); // HH:MM:SS
    rest = clean.substring(27).trim();
  }

  // rest: "LEVEL target: message key=val..."
  const wsIdx = rest.indexOf(' ');
  if (wsIdx === -1) return { level: 'unknown', time, target: '', message: rest };

  const level = rest.substring(0, wsIdx).toUpperCase();
  const afterLevel = rest.substring(wsIdx + 1).trim();

  // afterLevel: "target: message" 或 "message"
  let target = '';
  let message = afterLevel;
  const colonIdx = afterLevel.indexOf(': ');
  if (colonIdx > 0) {
    target = afterLevel.substring(0, colonIdx);
    message = afterLevel.substring(colonIdx + 2);
  }

  return { level: level.toLowerCase(), time, target, message };
}

// 工具函数
// ═══════════════════════════════════════════════════════════════
function esc(str) {
  if (str === null || str === undefined) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function escAttr(str) {
  if (str === null || str === undefined) return '';
  return String(str).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function trunc(str, len) {
  if (!str) return '';
  return str.length > len ? str.substring(0, len) + '...' : str;
}

function maskKey(key) {
  if (!key) return '';
  if (key.length <= 8) return '****';
  return key.substring(0, 4) + '****' + key.substring(key.length - 4);
}

function fmtUptime(secs) {
  if (!secs || secs <= 0) return '—';
  const d = Math.floor(secs / 86400);
  const h = Math.floor((secs % 86400) / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const parts = [];
  if (d > 0) parts.push(d + '天');
  if (h > 0) parts.push(h + '小时');
  parts.push(m + '分钟');
  return parts.join(' ');
}

function computerLabel(v) {
  if (!v || v === 'disabled') return '已禁用';
  if (v === 'playwright') return 'Playwright';
  if (v === 'browser-use') return 'Browser-Use';
  return v;
}

		function computeStats(entries) {

		  const totalMs = entries.reduce((s, e) => s + (e.duration_ms || 0), 0);
		  return {

		function renderTrendChart(entries) {
		  const now = Date.now() / 1000;
		  let buckets = [];
		  if (_historyChartPeriod === 'hourly') {
		    for (let i = 23; i >= 0; i--) {
		      const slot = Math.floor(now / 3600) - i;
		      const d = new Date(slot * 3600 * 1000);
		      buckets.push({ label: d.getHours() + '时', start: slot * 3600, end: (slot + 1) * 3600, tokens: 0 });
		    }
		  } else if (_historyChartPeriod === 'daily') {
		    for (let i = 6; i >= 0; i--) {
		      const dayStart = new Date(new Date().getFullYear(), new Date().getMonth(), new Date().getDate() - i);
		      const start = Math.floor(dayStart.getTime() / 1000);
		      const end = start + 86400;
		      buckets.push({ label: (dayStart.getMonth() + 1) + '/' + dayStart.getDate(), start, end, tokens: 0 });
		    }
		  } else {
		    // 月度：从归档统计 + 当前月实时数据合并
		    const statMap = {};
		    for (const s of (_historyMonthlyStats || [])) {
		      statMap[s.year_month] = s.total_tokens;
		    }
		    // 覆盖当前月（实时数据优先）
		    const nowDate = new Date();
		    const thisMonth = nowDate.getFullYear() + '-' + String(nowDate.getMonth() + 1).padStart(2, '0');
		    let thisMonthTokens = 0;
		    const thisMonthStart = Math.floor(new Date(nowDate.getFullYear(), nowDate.getMonth(), 1).getTime() / 1000);
		    const nextMonthStart = Math.floor(new Date(nowDate.getFullYear(), nowDate.getMonth() + 1, 1).getTime() / 1000);
		    for (const e of entries) {
		      if (e.created_at >= thisMonthStart && e.created_at < nextMonthStart) {
		        thisMonthTokens += e.total_tokens || 0;
		      }
		    }
		    if (thisMonthTokens > 0 || !statMap[thisMonth]) statMap[thisMonth] = thisMonthTokens;
		    // 生成最近 6 个月桶
		    for (let i = 5; i >= 0; i--) {
		      const d = new Date(nowDate.getFullYear(), nowDate.getMonth() - i, 1);
		      const ym = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
		      buckets.push({ label: (d.getMonth() + 1) + '月', tokens: statMap[ym] || 0 });
		    }
		  }
		  if (_historyChartPeriod !== 'monthly') {
		    for (const e of entries) {
		      for (const b of buckets) {
		        if (e.created_at >= b.start && e.created_at < b.end) { b.tokens += e.total_tokens || 0; break; }
		      }
		    }
		  }
		  const maxTokens = Math.max(...buckets.map(b => b.tokens), 1);
		  let html = '';
		  for (const b of buckets) {
		    const pct = Math.round(b.tokens / maxTokens * 100);

		    html += '<div class="history-chart-bar-wrap"><div class="history-chart-bar" style="height:' + pct + '%"></div></div>';
		    html += '<span class="history-chart-label">' + b.label + '</span>';
		    html += '</div>';
		  }
		  return html;
		}

		      if (statsEl) statsEl.innerHTML = '<div class="history-stat"><div class="stat-value">0</div><div class="stat-label">总请求数</div></div><div class="history-stat green"><div class="stat-value">—</div><div class="stat-label">成功率</div></div><div class="history-stat accent"><div class="stat-value">0</div><div class="stat-label">Token 消耗</div></div><div class="history-stat"><div class="stat-value">—</div><div class="stat-label">平均耗时</div></div>';
		      if (barsEl) barsEl.innerHTML = '<div class="session-empty" style="font-size:11px;padding:10px;">暂无数据</div>';
		      if (cardsEl) cardsEl.innerHTML = '<div class="session-empty">暂无请求记录，发送一次 API 请求后会自动出现</div>';
		    }
		  } catch (e) {
		    const cached = loadHistoryCache();
		    if (cached) {
		      _historyEntries = cached.entries || [];
		      _historyMonthlyStats = cached.monthlyStats || [];
		      _historyOffline = true;
		      showHistoryOfflineBanner();
		      startReconnectPolling();
		      if (_historyEntries.length) {
		        if (statsEl) updateStats(computeStats(_historyEntries));
		        if (barsEl) barsEl.innerHTML = renderTrendChart(_historyEntries);
		        if (cardsEl) cardsEl.innerHTML = renderHistoryCards(_historyEntries);
		      } else {
		        if (cardsEl) cardsEl.innerHTML = '<div class="session-empty">暂无缓存数据，服务启动后将自动刷新</div>';
		      }
		    } else {
		      if (cardsEl) cardsEl.innerHTML = '<div class="session-empty" style="color:var(--red);">加载失败: ' + esc(e.message || String(e)) + '</div>';
		    }
		  }
		}

		function loadHistoryCache() {
		  try {
		    const raw = localStorage.getItem(HISTORY_CACHE_KEY);
		    if (!raw) return null;
		    const data = JSON.parse(raw);
		    if (!data || !data.entries) return null;
		    return data;
		  } catch (_) { return null; }
		}

		function showHistoryOfflineBanner() {
		  const existing = document.getElementById('historyOfflineBanner');
		  if (existing) { existing.style.display = ''; return; }
		  const statsEl = document.getElementById('historyStats');
		  if (!statsEl) return;
		  const div = document.createElement('div');
		  div.id = 'historyOfflineBanner';
		  div.style.cssText = 'display:flex;align-items:center;justify-content:space-between;padding:8px 12px;margin-bottom:12px;background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.3);border-radius:8px;font-size:12px;color:var(--yellow,#b45309);';
		  div.innerHTML = '<span>⚠ 服务未启动，当前显示的是本地缓存数据</span><button class="btn btn-sm btn-primary" onclick="refreshHistory()" style="font-size:11px;padding:4px 10px;">⟳ 尝试重连</button>';
		  statsEl.parentNode.insertBefore(div, statsEl);
		}

		function hideHistoryOfflineBanner() {
		  const banner = document.getElementById('historyOfflineBanner');
		  if (banner) banner.style.display = 'none';
		}

		function startReconnectPolling() {
		  if (_historyReconnectTimer) return;
		  _historyReconnectTimer = setInterval(async () => {
		    try {
		      const status = await invoke('get_service_status');
		      if (status && status.running) {
		        stopReconnectPolling();
		        refreshHistory();
		      }
		    } catch (_) {}
		  }, 3000);
		}

		function stopReconnectPolling() {
		  if (_historyReconnectTimer) { clearInterval(_historyReconnectTimer); _historyReconnectTimer = null; }
		}

		function fmtTime(unixSecs) {
		  if (!unixSecs) return '—';
		  const d = new Date(unixSecs * 1000);
		  const pad = n => String(n).padStart(2, '0');
		  return `${d.getMonth() + 1}/${d.getDate()} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
		}

		function fmtTokens(n) {
		  if (!n) return '0';
		  if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
		  return n.toString();
		}

		function fmtDuration(ms) {
		  if (!ms) return '—';
		  if (ms < 1000) return ms + 'ms';
		  if (ms < 60000) return (ms / 1000).toFixed(1) + 's';
		  return (ms / 60000).toFixed(1) + 'min';
		}

		function statusBadge(status) {
		  const map = { completed: ['#22c55e', '✓ 成功'], failed: ['#ef4444', '✗ 失败'] };
		  const [color, label] = map[status] || ['#9ca3af', status];
		  return `<span style="color:${color};font-weight:500;">${label}</span>`;
		}

		async function clearHistory() {
		  if (!confirm('确定要清空所有请求历史吗？此操作不可恢复。')) return;
		  try {
		    await invoke('clear_request_history');
		    showToast('请求历史已清空', 'success');
		    _historyEntries = [];
		    refreshHistory();
		  } catch (e) {
		    showToast('清空失败: ' + e, 'error');
		  }
		}

let _threadsData = null;

function renderThreads() {
  return `<div class="page-header">

    </table>
  </div>`;
}

async function refreshThreads() {
  try {
    const [status, list] = await Promise.all([
      invoke('get_threads_status'),
      invoke('list_threads'),
    ]);
    _threadsData = { status, list };

    // 更新统计卡片
    const cards = document.querySelectorAll('#threadsSummary .stat-value');
    if (cards.length >= 3) {
      cards[0].textContent = status.total;
      cards[1].textContent = status.non_unified_count;
      if (status.calibration_needed) {
        cards[2].textContent = '需要校准';
        cards[2].style.color = 'var(--amber)';
      } else {
        cards[2].textContent = status.active_provider || '—';
        cards[2].style.color = 'var(--text-primary)';
      }
    }

    // 更新按钮状态
    const btnMigrate = document.getElementById('btnMigrate');
    const btnRestore = document.getElementById('btnRestore');
    const btnCalibrate = document.getElementById('btnCalibrate');
    if (btnMigrate) btnMigrate.style.display = status.calibration_needed ? 'none' : '';
    if (btnMigrate) btnMigrate.disabled = status.migrated || status.non_unified_count === 0;
    if (btnRestore) btnRestore.style.display = status.calibration_needed ? 'none' : '';
    if (btnRestore) btnRestore.disabled = !status.migrated;
    if (btnCalibrate) btnCalibrate.style.display = status.calibration_needed ? '' : 'none';

    // 各 provider 分布
    const breakdown = document.getElementById('threadsProviderBreakdown');
    if (breakdown) {
      breakdown.innerHTML = status.summary.map(s => {
        const cls = s.provider === status.active_provider ? 'tag-current' : 'tag-other';
        return `<span class="tag ${cls}" style="margin-right:6px;margin-bottom:4px;">${esc(s.provider)}: ${s.count}</span>`;
      }).join('');
    }

    // 线程列表
    const tbody = document.getElementById('threadsTableBody');
    if (tbody) {
      if (!list || list.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--text-muted);">无线程数据</td></tr>';
      } else {
        tbody.innerHTML = list.map(t => {
          const isActive = status.active_provider && t.model_provider === status.active_provider;
          const providerTag = isActive
            ? `<span class="tag tag-current">${esc(t.model_provider)}</span>`
            : `<span class="tag tag-other">${esc(t.model_provider)}</span>`;
          const time = t.updated_at_ms
            ? new Date(t.updated_at_ms).toLocaleString('zh-CN')
            : '—';
          const archived = t.archived ? ' [已归档]' : '';
          return `<tr class="thread-row" onclick="openThread('${escAttr(t.id)}')">
            <td title="${escAttr(t.title)}"><span class="td-title-text">${esc(t.title || '(无标题)')}${archived}</span><span class="tag-delete" onclick="event.stopPropagation();deleteThreadRow('${escAttr(t.id)}')">删除</span></td>
            <td>${providerTag}</td>
            <td>${esc(time)}</td>
            <td>${esc(t.id).substring(0,12)}...</td>
          </tr>`;
        }).join('');
      }
    }
  } catch (err) {
    showToast('加载线程数据失败: ' + err, 'error');
    const tbody = document.getElementById('threadsTableBody');
    if (tbody) tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--red);">加载失败: ' + esc(String(err)) + '</td></tr>';
  }
}

async function doMigrate() {
  if (!await showConfirm('确定要聚合所有线程吗？\n\n所有线程将统一到当前活跃 provider，Codex 侧边栏将聚合显示所有会话。\n迁移前会自动备份，可随时还原。')) return;

  const btn = document.getElementById('btnMigrate');
  if (btn) btn.disabled = true;
  showToast('迁移中...', 'info');

  try {
    const diff = await invoke('migrate_threads');
    showToast(`已迁移 ${diff.changed_count} 条线程`, 'success');
    await refreshThreads();
  } catch (err) {
    showToast('迁移失败: ' + err, 'error');
  } finally {
    if (btn) btn.disabled = false;
  }
}

async function doRestore() {
  if (!await showConfirm('确定要切换到隔离模式吗？\n\n所有线程将还原到各自的原始 provider。\n\n还原后备份将被删除。')) return;

  const btn = document.getElementById('btnRestore');
  if (btn) btn.disabled = true;
  showToast('还原中...', 'info');

  try {
    const diff = await invoke('restore_threads');
    showToast(`已还原 ${diff.changed_count} 条线程`, 'success');
    await refreshThreads();
  } catch (err) {
    showToast('还原失败: ' + err, 'error');
  } finally {
    if (btn) btn.disabled = false;
  }
}

async function doCalibrate() {
  const activeProvider = (_threadsData && _threadsData.status && _threadsData.status.active_provider) || '';
  if (!await showConfirm(`检测到活跃 provider 已变更，需要重新校准。\n\n将还原原始 provider 后重新聚合到「${activeProvider}」。`)) return;

  const btn = document.getElementById('btnCalibrate');
  if (btn) btn.disabled = true;
  showToast('校准中...', 'info');

  try {
    const diff = await invoke('calibrate_threads');
    showToast(`已校准 ${diff.changed_count} 条线程到 ${diff.target_provider}`, 'success');
    await refreshThreads();
  } catch (err) {
    showToast('校准失败: ' + err, 'error');
  } finally {
    if (btn) btn.disabled = false;
  }
}

function openThread(threadId) {
  _currentThreadId = threadId;
  const container = document.getElementById('mainContent');
  if (!container) return;
  container.innerHTML = `<div class="detail-panel">
    <div class="detail-header">
      <button class="detail-back-btn" onclick="closeThreadDetail()">← 返回</button>

    </div>
  </div>`;

  invoke('get_thread_content', { threadId })
    .then(content => {
      const titleEl = document.getElementById('detailTitle');
      if (titleEl) titleEl.textContent = content.thread.title || '(无标题)';
      const msgsEl = document.getElementById('detailMessages');
      if (!msgsEl) return;
      if (!content.messages || content.messages.length === 0) {
        msgsEl.innerHTML = '<div class="detail-loading">此会话无对话内容</div>';
        return;
      }
      msgsEl.innerHTML = content.messages.map(renderMessage).join('');
    })
    .catch(err => {
      const msgsEl = document.getElementById('detailMessages');
      if (msgsEl) msgsEl.innerHTML = `<div class="detail-loading" style="color:var(--red);">加载失败: ${esc(String(err))}</div>`;

function closeThreadDetail() {
  _currentThreadId = null;
  const container = document.getElementById('mainContent');
  if (container) container.innerHTML = renderThreads();
  refreshThreads();
}

function renderMessage(msg) {
  const role = (msg.payload && msg.payload.role) || msg.role || (msg.type || 'system');
  const roleClass = ['user', 'assistant', 'developer', 'tool'].includes(role) ? role : 'system';

  let body = '';
  if (msg.payload && msg.payload.content) {
    if (Array.isArray(msg.payload.content)) {
      body = msg.payload.content
        .filter(c => c.type === 'input_text' || c.type === 'output_text' || c.type === 'text')
        .map(c => c.text || '')
        .join('\n');
    } else if (typeof msg.payload.content === 'string') {
      body = msg.payload.content;
    }
  }
  if (!body && msg.payload && msg.payload.text) {
    body = msg.payload.text;
  }
  if (!body) {
    try { body = JSON.stringify(msg.payload || msg, null, 2); } catch (_) { body = '(无法解析)'; }
  }

  const truncated = body.length > 500;
  const displayBody = truncated ? body.substring(0, 500) : body;
  const expandBtn = truncated
    ? `<button class="msg-expand-btn" onclick="this.previousElementSibling.classList.toggle('expanded');this.textContent=this.previousElementSibling.classList.contains('expanded')?'收起':'展开全部';">展开全部</button>`
    : '';

  return `<div class="msg-bubble ${roleClass}">
    <div class="msg-role">${esc(role)}</div>
    <div class="msg-body">${esc(displayBody)}</div>
    ${expandBtn}
  </div>`;
}

function renderModelMappingRows(knownModels) {
  const a = editingAccount;
  if (!a) return '';
  const map = a.model_map || {};
  const rows = [];
  for (const codexModel of CODEX_MODEL_LIST) {
    const val = map[codexModel] || '';
    rows.push({ codexModel, val, readonly: true });
  }
  // 添加自定义映射（不在预定义列表中的）
  for (const [k, v] of Object.entries(map)) {
    if (!CODEX_MODEL_LIST.includes(k) && k) {
      rows.push({ codexModel: k, val: v, readonly: false });
    }
  }
  // 优先使用从上游获取的模型列表，否则用预设列表
  const modelSource = upstreamModels.length > 0 ? upstreamModels : (knownModels || []);
  const datalistId = 'dl_' + Math.random().toString(36).slice(2, 8);
  const datalistOptions = modelSource.map(m => `<option value="${escAttr(m)}">`).join('');
  const datalistHtml = `<datalist id="${datalistId}">${datalistOptions}</datalist>`;

  return datalistHtml + rows.map((r, i) => {
    const labelExtra = r.readonly ? '' : ' (自定义)';
    return `<div class="model-row">
      <div class="model-label codex">${esc(r.codexModel)}${labelExtra}</div>
      <div class="model-value">
        <input type="text" value="${escAttr(r.val)}" placeholder="未映射 (使用原名)" list="${datalistId}"
          data-codex="${escAttr(r.codexModel)}" data-readonly="${r.readonly}"
          onchange="onModelMapChange(this)">
        <button class="model-remove" onclick="removeModelMapRow(this)" title="移除">✕</button>
      </div>
    </div>`;
  }).join('');
}

async function loadAccountsData() {
  try {
    const result = await invoke('list_accounts');
    accountsData = result;
    if (!providerPresets.length) await loadProviderPresets();
    if (accountsView !== 'add') renderMainContent();

    if (accountsView === 'list') {
      (accountsData.accounts || []).forEach(a => fetchBalanceForCard(a));
    }
  } catch (e) {
    showToast('加载账号失败: ' + e, 'error');
  }
}

async function loadProviderPresets() {
  try {
    providerPresets = await invoke('get_provider_presets');
  } catch (e) {
    showToast('加载供应商列表失败: ' + e, 'error');
  }
}

function getProviderKnownModels(provider) {
  const p = providerPresets.find(pp => pp.slug === provider);
  return p ? p.known_models : [];
}

function onModelMapChange(input) {
  // 预留：当用户修改上游模型名时更新占位数据
}

function removeModelMapRow(btn) {
  const row = btn.closest('.model-row');
  const input = row.querySelector('input');
  if (input) {
    const codex = input.dataset.codex;
    if (editingAccount && editingAccount.model_map) {
      delete editingAccount.model_map[codex];
    }
  }
  row.remove();
}

function addModelRow(containerId, knownModelsJson) {
  const knownModels = JSON.parse(knownModelsJson);
  const datalistId = 'dl_custom_' + Math.random().toString(36).slice(2, 8);
  const datalistOptions = knownModels.map(m => `<option value="${escAttr(m)}">`).join('');

  const container = document.getElementById(containerId);
  const datalist = document.createElement('datalist');
  datalist.id = datalistId;
  datalist.innerHTML = datalistOptions;
  container.appendChild(datalist);

  const row = document.createElement('div');
  row.className = 'model-row';
  row.innerHTML = `<div class="model-label codex"><input type="text" class="custom-codex-model" placeholder="Codex 模型名" style="width:100%;background:var(--bg-input);border:1px solid var(--border-default);border-radius:var(--radius-sm);color:var(--text-primary);padding:7px 10px;font-size:12px;font-family:var(--font-mono);outline:none;"></div>
    <div class="model-value">
      <input type="text" placeholder="上游模型名" list="${datalistId}">
      <button class="model-remove" onclick="removeModelMapRow(this)" title="移除">✕</button>
    </div>`;
  container.appendChild(row);
}

function collectModelMap() {
  const result = {};
  const rows = document.querySelectorAll('#modelMapRows .model-row');
  rows.forEach(row => {
    const inputs = row.querySelectorAll('input[type="text"]');
    let codex, upstream;
    if (inputs.length === 2) {
      // 自定义行：左输入框是 codex 模型名，右是上游
      codex = inputs[0].value.trim();
      upstream = inputs[1].value.trim();
    } else if (inputs.length === 1) {
      codex = inputs[0].dataset.codex;
      upstream = inputs[0].value.trim();
    }
    if (codex && upstream) result[codex] = upstream;
  });
  return result;
}

async function switchAccount(id) {

    await invoke('switch_account', { id });

    await loadAccountsData();

function addAccount(provider) {
  const preset = providerPresets.find(p => p.slug === provider);
  if (!preset) return;
  editingAccount = {
    id: '',
    name: preset.label + ' 账号',
    provider: provider,
    upstream: preset.default_upstream,
    api_key: '',
    model_map: {},
    vision_enabled: false,
    vision_upstream: '',
    vision_api_key: '',
    vision_model: '',
    vision_endpoint: '',
    from_codex_config: false,
    balance_url: '',
    context_window_override: null,
    reasoning_effort_override: null,
    thinking_tokens: null,
    custom_headers: {},
    request_timeout_secs: null,
    max_retries: null,
    translate_enabled: true,
  };
  accountsView = 'edit';
  renderMainContent();
}

function editAccount(id) {
  editingAccount = accountsData.accounts.find(a => a.id === id);
  if (!editingAccount) {
    showToast('账号不存在', 'error');
    return;
  }
  // 深拷贝避免直接修改原数据
  editingAccount = JSON.parse(JSON.stringify(editingAccount));
  accountsView = 'edit';
  renderMainContent();
}

async function saveAccount() {
  if (!editingAccount) return;
  const a = editingAccount;

  a.name = document.getElementById('edit_name')?.value?.trim() || a.name;
  a.upstream = document.getElementById('edit_upstream')?.value?.trim() || a.upstream;

  const keyInput = document.getElementById('edit_api_key');
  if (keyInput) a.api_key = keyInput.value.trim();

  const visionEnabled = document.getElementById('edit_vision_enabled');
  if (visionEnabled) a.vision_enabled = visionEnabled.checked;

  const vu = document.getElementById('edit_vision_upstream');
  if (vu) a.vision_upstream = vu.value.trim();
  const vk = document.getElementById('edit_vision_api_key');
  if (vk) a.vision_api_key = vk.value.trim();
  const vm = document.getElementById('edit_vision_model');
  if (vm) a.vision_model = vm.value.trim();
  const ve = document.getElementById('edit_vision_endpoint');
  if (ve) a.vision_endpoint = ve.value.trim();

  const bu = document.getElementById('edit_balance_url');
  if (bu) a.balance_url = bu.value.trim();

  // 大上下文窗口覆盖
  const cwEnabled = document.getElementById('edit_cw_enabled');
  if (cwEnabled && cwEnabled.checked) {
    const cwSize = document.getElementById('edit_cw_size');
    a.context_window_override = cwSize ? parseInt(cwSize.value, 10) || null : null;
  } else {
    a.context_window_override = null;
  }

  // 推理配置
  const reasoningEnabled = document.getElementById('edit_reasoning_enabled');
  if (reasoningEnabled && reasoningEnabled.checked) {
    const effortSel = document.getElementById('edit_reasoning_effort');
    a.reasoning_effort_override = effortSel ? (effortSel.value || null) : null;
    const thinkingTokens = document.getElementById('edit_thinking_tokens');
    a.thinking_tokens = thinkingTokens ? (parseInt(thinkingTokens.value, 10) || null) : null;
  } else {
    a.reasoning_effort_override = null;
    a.thinking_tokens = null;
  }

  // 自定义 HTTP 头
  const headersText = document.getElementById('edit_custom_headers');
  if (headersText) {
    const raw = headersText.value.trim();
    a.custom_headers = {};
    if (raw) {
      for (const line of raw.split('\n')) {
        const colonIdx = line.indexOf(':');
        if (colonIdx > 0) {
          const k = line.substring(0, colonIdx).trim();
          const v = line.substring(colonIdx + 1).trim();
          if (k && v) a.custom_headers[k] = v;
        }
      }
    }
  }

  // 请求超时
  const timeoutInput = document.getElementById('edit_request_timeout');
  if (timeoutInput) {
    a.request_timeout_secs = parseInt(timeoutInput.value, 10) || null;
  } else {
    a.request_timeout_secs = null;
  }

  // 最大重试次数
  const retriesInput = document.getElementById('edit_max_retries');
  if (retriesInput) {
    a.max_retries = parseInt(retriesInput.value, 10) || null;
  } else {
    a.max_retries = null;
  }

  const translateEnabled = document.getElementById('edit_translate_enabled');
  if (translateEnabled) a.translate_enabled = translateEnabled.checked;

  a.model_map = collectModelMap();
  a.updated_at = Math.floor(Date.now() / 1000);

  try {
    let result;
    if (!a.id) {
      // 新账号
      result = await invoke('add_account', { provider: a.provider || 'custom', accountJson: JSON.stringify(a) });
      showToast('账号已创建', 'success');
    } else {
      result = await invoke('update_account', { accountJson: JSON.stringify(a) });
      showToast('账号已保存', 'success');
    }
    await loadAccountsData();
    editingAccount = accountsData.accounts.find(ac => ac.id === result.id);
    if (editingAccount) editingAccount = JSON.parse(JSON.stringify(editingAccount));
    renderMainContent();
  } catch (e) {
    showToast('保存账号失败: ' + e, 'error');
  }
}

async function fetchAndPopulateModels() {
  const statusEl = document.getElementById('modelFetchStatus');
  if (statusEl) statusEl.textContent = '获取中...';
  try {
    // 统一使用表单中的 upstream 和 api_key（用户可能已修改但尚未保存）
    const upstream = document.getElementById('edit_upstream')?.value?.trim();
    const keyInput = document.getElementById('edit_api_key');
    const apiKey = keyInput ? keyInput.value.trim() : '';
    if (!upstream) { showToast('请先填写上游 URL', 'error'); return; }
    upstreamModels = await invoke('fetch_upstream_models', { upstream, apiKey });
    if (upstreamModels.length > 0) {
      if (statusEl) statusEl.textContent = `✓ 获取到 ${upstreamModels.length} 个模型`;
      // 重新渲染模型映射行
      const knownModels = getProviderKnownModels(editingAccount?.provider || '');
      document.getElementById('modelMapRows').innerHTML = renderModelMappingRows(knownModels);
    } else {
      if (statusEl) statusEl.textContent = '上游未返回模型';
    }
  } catch (e) {
    if (statusEl) statusEl.textContent = '获取失败';
    showToast('获取模型列表失败: ' + e, 'error');
  }
}

async function testUpstreamConnectivity() {
  const upstream = document.getElementById('edit_upstream')?.value?.trim();
  if (!upstream) { showToast('请先填写上游 URL', 'error'); return; }
  const keyInput = document.getElementById('edit_api_key');
  const apiKey = keyInput ? keyInput.value.trim() : '';
  const resultEl = document.getElementById('connectivityResult');
  if (resultEl) resultEl.innerHTML = '<span style="color:var(--text-muted);">检测中...</span>';
  try {
    const result = await invoke('test_upstream_connectivity', { upstream, apiKey });
    if (result.ok) {
      const models = result.model_count != null ? `，${result.model_count} 个模型` : '';
      if (resultEl) resultEl.innerHTML = `<span style="color:#22c55e;">✓ 连通 (${result.status}, ${result.latency_ms}ms${models})</span>`;
      showToast(`上游连通正常 (${result.latency_ms}ms${models})`, 'success');
    } else if (result.error) {
      if (resultEl) resultEl.innerHTML = `<span style="color:#ef4444;">✗ ${esc(result.error)}</span>`;
      showToast('连通失败: ' + result.error, 'error');
    } else {
      if (resultEl) resultEl.innerHTML = `<span style="color:#f59e0b;">⚠ HTTP ${result.status} (${result.latency_ms}ms)</span>`;
      showToast(`上游返回 HTTP ${result.status}`, 'error');
    }
  } catch (e) {
    if (resultEl) resultEl.innerHTML = `<span style="color:#ef4444;">✗ ${esc(String(e))}</span>`;
    showToast('连通测试异常: ' + e, 'error');
  }
}

async function fetchBalanceForCard(a) {
  const el = document.getElementById('balance-' + a.id);
  if (!el) return;
  const cacheKey = a.id;
  // 5 分钟内使用缓存
  if (balanceCache[cacheKey] && balanceCache[cacheKey].ts > Date.now() - 300000) {
    el.innerHTML = renderBalanceInfo(balanceCache[cacheKey].info);
    return;
  }
  el.innerHTML = '<span class="balance-loading">...</span>';
  try {
    const info = await invoke('fetch_balance', { accountId: a.id });
    balanceCache[cacheKey] = { info, ts: Date.now() };
    el.innerHTML = renderBalanceInfo(info);
  } catch (e) {
    el.innerHTML = '<span class="balance-na">不可用</span>';
  }
}

async function refreshBalanceForCard(id) {
  const a = (accountsData.accounts || []).find(acc => acc.id === id);
  if (!a) return;
  delete balanceCache[id];
  await fetchBalanceForCard(a);
}

function renderBalanceInfo(info) {
  if (info.mode === 'token_credit') {
    const remaining = info.credit_remaining;
    const limit = info.credit_limit;
    const pct = limit > 0 ? Math.round(remaining / limit * 100) : 0;
    const label = info.credit_label ? ` (${info.credit_label})` : '';
    return `<div class="balance-row">
      <span>💳 $${remaining != null ? remaining.toFixed(2) : '—'}${limit != null ? ' / $' + limit.toFixed(2) : ''}${label}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.min(pct, 100)}%"></div></div>
    </div>`;
  }
  if (info.mode === 'subscription') {
    return `<div class="balance-row">
      <span>📅 ${info.weekly_remaining || '—'}/${info.weekly_limit || '—'}</span>
      <span>⏱ 5h: ${info.hours_5_remaining || '—'}</span>
    </div>`;
  }
  if (info.mode === 'coding_plan' && info.model_remains) {
    const coding = info.model_remains.find(m => m.model_name === 'MiniMax-M*') || info.model_remains[0];
    if (!coding) return '<span class="balance-na">无模型数据</span>';
    const iRemain = coding.interval_total - coding.interval_used;
    const iPct = coding.interval_total > 0 ? Math.round(iRemain / coding.interval_total * 100) : 0;
    const wRemain = coding.weekly_total - coding.weekly_used;
    const wPct = coding.weekly_total > 0 ? Math.round(wRemain / coding.weekly_total * 100) : 0;
    return `<div class="balance-row">
      <span>5h ${iRemain}/${coding.interval_total}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.min(iPct, 100)}%"></div></div>
      <span style="font-size:10px;">周 ${wRemain}/${coding.weekly_total}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.min(wPct, 100)}%"></div></div>
    </div>`;
  }
  return '<span class="balance-na">不支持</span>';
}

// 插件状态常量

var ACCOUNT_STATUS_LABEL = {

};

  connecting: 'var(--amber)',
  connected: 'var(--green)',
  login_expired: 'var(--red)',
  error: 'var(--red)'

async function loadPluginsData() {

    _pluginsData = await invoke('list_plugins') || [];

function renderPluginList() {
  var el = document.getElementById('pluginList');

// 列表视图卡片 — 状态灯 + 名称版本/简介 + 启停按钮
function renderPluginCard(p) {
  var running = p.state === 'running';
  var stateLabel = PLUGIN_STATE_LABEL[p.state] || p.state;
  var sc = running ? 'var(--green)' : 'var(--text-muted)';

  return `<div class="plugin-card${running ? ' running' : ''}" onclick="showPluginDetail('${escAttr(p.id)}')">
    <span class="plugin-card-status">
      <span class="plugin-status-dot${running ? ' live' : ''}" style="color:${sc};background:${sc}"></span>
    </span>
    <div class="plugin-card-body">
      <div class="plugin-card-row">
        <span class="plugin-card-name">${esc(p.name)}</span>
        <span class="plugin-card-version">v${esc(p.version)}</span>
        <span class="plugin-state-badge ${running ? 'on' : 'off'}"><span class="dot"></span>${stateLabel}</span>
      </div>
      ${p.description ? `<div class="plugin-card-desc">${esc(p.description)}</div>` : ''}
    </div>
    <div class="plugin-card-actions" onclick="event.stopPropagation()">
      ${running
        ? `<button class="btn-apply" onclick="stopPlugin('${escAttr(p.id)}')" style="background:var(--red-dim);color:var(--red);border-color:var(--red);">停止</button>`
        : `<button class="btn-apply" onclick="startPlugin('${escAttr(p.id)}')">启动</button>`}
    </div>
  </div>`;
}

// ── 插件详情页 ──
function showPluginDetail(id) {
  _pluginDetailId = id;
  switchPanel('plugins');
}

function backToPluginList() {
  _pluginDetailId = null;
  switchPanel('plugins');
}

function renderPluginDetail() {
  var p = _pluginsData.find(p => p.id === _pluginDetailId);
  if (!p) {
    _pluginDetailId = null;
    return renderPluginsPanel();
  }
  var running = p.state === 'running';
  var stateLabel = PLUGIN_STATE_LABEL[p.state] || p.state;
  var sc = running ? 'var(--green)' : 'var(--text-muted)';
  var perms = p.permissions || [];
  var accounts = p.accounts || [];

  var accountsHtml = '';
  if (accounts.length) {
    accountsHtml = accounts.map(a => {
      var asc = ACCOUNT_STATUS_COLOR[a.status] || 'var(--text-muted)';
      var isConnected = a.status === 'connected';
      return `<div class="pc-account-row">
        <span class="pc-account-name">${esc(a.name || a.account_id)}</span>
        <span class="pc-account-status" style="color:${asc}">
          <span class="plugin-status-dot" style="color:${asc};background:${asc};box-shadow:0 0 5px ${asc}"></span>
          ${ACCOUNT_STATUS_LABEL[a.status] || a.status}
        </span>
        <span class="pc-account-actions">
          ${isConnected
            ? `<button class="btn-apply" onclick="stopPluginAccount('${escAttr(p.id)}','${escAttr(a.account_id)}')" style="background:var(--red-dim);color:var(--red);border-color:var(--red);">停止网关</button>`
            : `<button class="btn-apply" onclick="scanAndStart('${escAttr(p.id)}','${escAttr(a.account_id)}')">启动网关</button>`}
          <button class="btn-apply" onclick="scanPluginQr('${escAttr(p.id)}','${escAttr(a.account_id)}')" style="background:var(--accent-dim);color:var(--accent);border-color:var(--accent);">扫码登录</button>
          <button class="btn-apply" onclick="deletePluginAccount('${escAttr(p.id)}','${escAttr(a.account_id)}')" style="background:var(--red-dim);color:var(--red);border-color:var(--red);">删除</button>
        </span>
      </div>`;
    }).join('');
  } else {
    accountsHtml = '<div style="color:var(--text-muted);font-size:12px;padding:8px 0;">暂无账号</div>';
  }

  return `<button class="plugin-detail-back" onclick="backToPluginList()">← 插件管理</button>

  <div class="plugin-detail-header">
    <div class="plugin-detail-title">
      <h2>
        <span class="plugin-status-dot" style="color:${sc};background:${sc};box-shadow:0 0 8px ${sc};vertical-align:middle;margin-right:8px;"></span>
        ${esc(p.name)}
        <span class="plugin-state-badge ${running ? 'on' : 'off'}" style="vertical-align:middle;margin-left:10px;"><span class="dot"></span>${stateLabel}</span>
      </h2>
      <div class="meta">
        <span>版本 v${esc(p.version)}</span>
        ${p.author ? `<span>作者 ${esc(p.author)}</span>` : ''}
      </div>
    </div>
    ${running
      ? `<button class="btn-apply" onclick="stopPlugin('${escAttr(p.id)}')" style="background:var(--red-dim);color:var(--red);border-color:var(--red);flex-shrink:0;">停止插件</button>`
      : `<button class="btn-apply" onclick="startPlugin('${escAttr(p.id)}')" style="flex-shrink:0;">启动插件</button>`}
  </div>

  ${p.description ? `<div class="plugin-detail-section">
    <h3>简介</h3>
    <p style="color:var(--text-secondary);font-size:13px;line-height:1.6;">${esc(p.description)}</p>
  </div>` : ''}

  ${perms.length ? `<div class="plugin-detail-section">
    <h3>权限</h3>
    <div class="plugin-perm-tags">${perms.map(perm => `<span class="plugin-perm-tag">${esc(perm)}</span>`).join('')}</div>
  </div>` : ''}

  <div class="plugin-detail-section">
    <h3>账号</h3>
    ${accountsHtml}
    <div class="pc-add-account">
      <input id="addAccountId_${escAttr(p.id)}" placeholder="新 Account ID">
      <button class="btn-apply" onclick="addPluginAccount('${escAttr(p.id)}')">添加账号</button>
    </div>
    <div id="qrContainer_${escAttr(p.id)}" class="pc-qr"></div>
  </div>

  <div class="plugin-danger-zone">
    <h3>卸载插件</h3>
    <p style="color:var(--text-muted);font-size:12px;margin-bottom:10px;">卸载后将删除插件所有文件，此操作不可恢复。</p>
    <button class="btn-apply" onclick="uninstallPlugin('${escAttr(p.id)}')" style="background:var(--red-dim);color:var(--red);border-color:var(--red);">卸载插件</button>
  </div>`;
}

async function installPluginFromPath() {
  const path = document.getElementById('pluginZipPath').value.trim();
  if (!path) { showToast('请输入插件包路径'); return; }
  try {
    await invoke('install_plugin', { archivePath: path });
    showToast('插件已安装', 'success');
    document.getElementById('pluginZipPath').value = '';
    await loadPluginsData();
  } catch(e) { showToast('安装失败: ' + esc(String(e)), 'error'); }
}

async function browsePluginZip() {
  try {
    const path = await invoke('browse_file');
    if (path) {
      document.getElementById('pluginZipPath').value = path;
    }
  } catch(e) {
    showToast('文件选择失败: ' + esc(String(e)), 'error');
  }
}

async function startPlugin(id) {
  try {
    await invoke('start_plugin', { pluginId: id });
    showToast('插件已启动', 'success');
    await loadPluginsData();
  } catch(e) { showToast('启动失败: ' + esc(String(e)), 'error'); }
}

async function stopPlugin(id) {
  try {
    await invoke('stop_plugin', { pluginId: id });
    showToast('插件已停止', 'success');
    await loadPluginsData();
  } catch(e) { showToast('停止失败: ' + esc(String(e)), 'error'); }
}

async function uninstallPlugin(id) {
  if (!confirm('确定要卸载该插件吗？此操作不可恢复。')) return;
  try {
    await invoke('uninstall_plugin', { pluginId: id });
    showToast('插件已卸载', 'success');
    await loadPluginsData();
  } catch(e) { showToast('卸载失败: ' + esc(String(e)), 'error'); }
}

async function startPluginAccount(pluginId, accountId) {
  try {
    await invoke('start_plugin_account', { pluginId: pluginId, accountId: accountId });
    showToast('网关启动指令已发送', 'success');
    await loadPluginsData();
  } catch(e) { showToast('启动网关失败: ' + esc(String(e)), 'error'); }
}

async function stopPluginAccount(pluginId, accountId) {
  try {
    await invoke('stop_plugin_account', { pluginId: pluginId, accountId: accountId });
    showToast('网关已停止', 'success');
    await loadPluginsData();
  } catch(e) { showToast('停止网关失败: ' + esc(String(e)), 'error'); }
}

async function scanAndStart(pluginId, accountId) {
  // 先尝试直接启动网关
  try {
    const r = await invoke('start_plugin_account', { pluginId: pluginId, accountId: accountId });
    showToast('网关已启动', 'success');
    await loadPluginsData();
    return;
  } catch(e) {
    // 如果未登录，自动触发扫码流程
    if (String(e).includes('bot_token') || String(e).includes('扫码') || String(e).includes('登录')) {
      showToast('需要先登录，正在获取二维码...');
    } else {
      showToast('启动失败: ' + esc(String(e)), 'error');
      return;
    }
  }
  // 扫码登录
  var oc = document.getElementById('qrOverlayContent');
  var oa = document.getElementById('qrOverlayAccount');
  oc.innerHTML = '<span style="color:var(--text-muted);">获取二维码中...</span>';
  oa.textContent = '账号：' + accountId + '（扫码后自动启动网关）';
  showQrOverlay();
  try {
    var result2 = await invoke('get_plugin_qrcode', { pluginId: pluginId, accountId: accountId });
    var url2 = result2.qrcode_data_url || result2.data_url || '';
    if (url2) {
      oc.innerHTML = `<img src="${esc(url2)}" alt="QR"><p class="qr-hint" style="color:var(--amber);">请使用微信扫码，扫码后网关将自动启动</p>`;
      // 轮询状态，连接成功后自动启动网关
      var pollCount = 0;
      var pollTimer = setInterval(async () => {
        pollCount++;
        try {
          var status = await invoke('query_plugin_status', { pluginId: pluginId, accountId: accountId });
          if (status && status.status === 'connected') {
            clearInterval(pollTimer);
            oc.innerHTML = '<span style="color:var(--green);">登录成功，正在启动网关...</span>';
            try {
              await invoke('start_plugin_account', { pluginId: pluginId, accountId: accountId });
              showToast('网关已启动', 'success');
              closeQrOverlay();
            } catch(e2) {
              oc.innerHTML = '<span style="color:var(--red);">网关启动失败: ' + esc(String(e2)) + '</span>';
            }
            await loadPluginsData();
          }
        } catch(ee) {}
        if (pollCount > 60) { clearInterval(pollTimer); oc.innerHTML = '<span style="color:var(--red);">登录超时，请重试</span>'; }
      }, 2000);
    } else {
      oc.innerHTML = '<span style="color:var(--red);">' + esc(JSON.stringify(result2)) + '</span>';
    }
  } catch(e2) {
    oc.innerHTML = '<span style="color:var(--red);">获取二维码失败: ' + esc(String(e2)) + '</span>';
  }
}

async function deletePluginAccount(pluginId, accountId) {
  showToast('正在删除账号 ' + esc(accountId) + '...');
  try {
    var p = _pluginsData.find(p => p.id === pluginId);
    var accounts = (p && p.config && p.config.accounts) || {};
    delete accounts[accountId];
    await invoke('update_plugin_config', { pluginId: pluginId, config: { accounts: accounts } });
    showToast('账号已删除', 'success');
    await loadPluginsData();
  } catch(e) { showToast('删除失败: ' + esc(String(e)), 'error'); }
}

async function addPluginAccount(pluginId) {
  const input = document.getElementById('addAccountId_' + pluginId);
  const accountId = (input && input.value || '').trim();
  if (!accountId) { showToast('请输入 Account ID'); return; }
  try {
    const p = _pluginsData.find(p => p.id === pluginId);
    const existingAccounts = (p && p.config && p.config.accounts) || {};
    existingAccounts[accountId] = { name: accountId, enabled: true };
    await invoke('update_plugin_config', { pluginId: pluginId, config: { accounts: existingAccounts } });
    showToast('账号已添加', 'success');
    if (input) input.value = '';
    await loadPluginsData();
  } catch(e) { showToast('添加失败: ' + esc(String(e)), 'error'); }
}

function showQrOverlay() { document.getElementById('qrOverlay').classList.add('show'); }
function closeQrOverlay() { document.getElementById('qrOverlay').classList.remove('show'); }

  if (!accountId) { showToast('请先添加账号'); return; }

    var url = result.qrcode_data_url || result.data_url || '';
    if (url) {
      oc.innerHTML = `<img src="${esc(url)}" alt="QR"><p class="qr-hint" style="color:var(--amber);">请使用微信扫码，扫码后网关将自动启动</p>`;
      // 轮询登录状态，确认后自动启动网关
      var pollCount = 0;
      var pollTimer = setInterval(async () => {
        pollCount++;
        try {
          var status = await invoke('query_plugin_status', { pluginId: pluginId, accountId: accountId });
          if (status && status.status === 'connected') {
            clearInterval(pollTimer);
            oc.innerHTML = '<span style="color:var(--green);">登录成功，正在启动网关...</span>';
            try {
              await invoke('start_plugin_account', { pluginId: pluginId, accountId: accountId });
              showToast('网关已启动', 'success');
              closeQrOverlay();
            } catch(e2) {
              oc.innerHTML = '<span style="color:var(--red);">网关启动失败: ' + esc(String(e2)) + '</span>';
            }
            await loadPluginsData();
          }
        } catch(ee) {}
        if (pollCount > 60) { clearInterval(pollTimer); oc.innerHTML = '<span style="color:var(--red);">登录超时，请重试</span>'; }
      }, 2000);
    } else {
      oc.innerHTML = '<span style="color:var(--red);">' + esc(JSON.stringify(result)) + '</span>';
    }
  } catch(e) { oc.innerHTML = '<span style="color:var(--red);">获取失败: ' + esc(String(e)) + '</span>'; }
}

function togglePluginAutoRefresh() {
  if (_pluginsRefreshTimer) {
    clearInterval(_pluginsRefreshTimer);
    _pluginsRefreshTimer = null;
    _pluginsRefreshMs = 0;
    document.getElementById('pluginAutoToggle').classList.remove('on');
    document.getElementById('pluginIntervalSel').style.display = 'none';
  } else {
    _pluginsRefreshMs = parseInt(document.getElementById('pluginIntervalSel').value) || 10000;
    _pluginsRefreshTimer = setInterval(loadPluginsData, _pluginsRefreshMs);
    document.getElementById('pluginAutoToggle').classList.add('on');
    document.getElementById('pluginIntervalSel').style.display = '';
  }
}

function setPluginRefreshInterval(val) {
  _pluginsRefreshMs = parseInt(val);
  if (_pluginsRefreshTimer) { clearInterval(_pluginsRefreshTimer); _pluginsRefreshTimer = setInterval(loadPluginsData, _pluginsRefreshMs); }
}

async function refreshPlugins() {
  await loadPluginsData();
  showToast('已刷新');
}
