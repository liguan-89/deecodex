<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>deecodex · 控制台</title>
<link rel="stylesheet" href="css/app.css">
</head>
<body>

<div class="app">
  <!-- ═══ SIDEBAR ═══ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <span class="logo"></span>
      <h1>deecodex</h1>
      <span class="version" id="sidebarVersion">—</span>
    </div>

    <nav class="sidebar-nav" id="sidebarNav"></nav>

    <div class="sidebar-footer">
      <div class="status-bar" id="statusBar">
        <span class="indicator ok" id="connDot"></span>
        <span id="connLabel">服务运行中</span>
      </div>
      <div class="theme-toggle" id="themeToggle">
        <button class="theme-toggle-btn active" data-theme="dark" title="深色模式">◉</button>
        <button class="theme-toggle-btn" data-theme="light" title="亮色模式">◎</button>
        <button class="theme-toggle-btn" data-theme="auto" title="自动切换">◐</button>
      </div>
      <button class="save-btn" id="sidebarSaveBtn" onclick="saveConfig()">保存配置</button>
      <div class="sidebar-status" id="sidebarMsg"></div>
    </div>
  </aside>

  <!-- ═══ MAIN ═══ -->
  <main class="main" id="mainContent"></main>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="nav/fragments.js"></script>

<script src="js/tauri-api.js"></script>
<script src="js/ui-core.js"></script>
<script src="js/theme-config.js"></script>
<script src="js/formatters.js"></script>
<script src="js/log-viewer.js"></script>
<script src="js/service-management.js"></script>
<script src="js/setup-wizard.js"></script>
<script src="js/panels-core.js"></script>
<script src="js/request-history.js"></script>
<script src="js/threads.js"></script>
<script src="js/accounts.js"></script>
<script src="js/plugins.js"></script>
<script src="js/placeholder-pages.js"></script>
<script src="js/app-shell.js"></script>
<script src="js/startup.js"></script>
</body>
</html>
