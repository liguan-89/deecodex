<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEX AI · 控制台</title>
<link rel="stylesheet" href="css/app.css?v=3.1.0">
</head>
<body>

<div class="app">
  <div class="window-drag-strip" data-window-drag-region aria-hidden="true"></div>

  <!-- ═══ SIDEBAR ═══ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand" data-window-drag-region>
      <h1>DEX AI</h1>
    </div>

    <nav class="sidebar-nav" id="sidebarNav"></nav>

    <div class="sidebar-footer">
      <div class="status-bar" id="statusBar">
        <span class="indicator ok" id="connDot"></span>
        <span id="connLabel">服务运行中</span>
      </div>
      <div class="theme-toggle" id="themeToggle">
        <button class="theme-toggle-btn active" data-theme="dark" title="深色模式" aria-label="深色模式">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 14.5A7.5 7.5 0 0 1 9.5 4 8 8 0 1 0 20 14.5z"></path></svg>
        </button>
        <button class="theme-toggle-btn" data-theme="light" title="亮色模式" aria-label="亮色模式">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"></circle><path d="M12 3v2"></path><path d="M12 19v2"></path><path d="M3 12h2"></path><path d="M19 12h2"></path><path d="M5.6 5.6 7 7"></path><path d="M17 17l1.4 1.4"></path><path d="M18.4 5.6 17 7"></path><path d="M7 17l-1.4 1.4"></path></svg>
        </button>
        <button class="theme-toggle-btn" data-theme="auto" title="自动切换" aria-label="自动切换">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="8"></circle><path d="M12 4a8 8 0 0 1 0 16z"></path></svg>
        </button>
      </div>
      <button class="save-btn" id="sidebarSaveBtn" onclick="saveConfig()">保存配置</button>
      <div class="sidebar-status" id="sidebarMsg"></div>
    </div>
  </aside>

  <!-- ═══ MAIN ═══ -->
  <main class="main" id="mainContent"></main>
</div>

<div class="toast-container" id="toastContainer"></div>

<div class="qr-overlay" id="qrOverlay" aria-hidden="true">
  <div class="qr-dialog">
    <div class="qr-title">扫码登录</div>
    <div id="qrOverlayContent">
      <span style="color:var(--text-muted);">等待二维码...</span>
    </div>
    <div class="qr-account" id="qrOverlayAccount"></div>
    <button class="qr-close" id="qrCloseBtn" type="button">关闭</button>
  </div>
</div>

<script src="nav/fragments.js?v=3.1.0"></script>

<script src="js/tauri-api.js?v=3.1.0"></script>
<script src="js/ui-core.js?v=3.1.0"></script>
<script src="js/theme-config.js?v=3.1.0"></script>
<script src="js/formatters.js?v=3.1.0"></script>
<script src="js/log-viewer.js?v=3.1.0"></script>
<script src="js/service-management.js?v=3.1.0"></script>
<script src="js/setup-wizard.js?v=3.1.0"></script>
<script src="js/panels-core.js?v=3.1.0"></script>
<script src="js/request-history.js?v=3.1.0"></script>
<script src="js/threads.js?v=3.1.0"></script>
<script src="js/accounts.js?v=3.1.0"></script>
<script src="js/client-lifecycle.js?v=3.1.0"></script>
<script src="js/plugins.js?v=3.1.0"></script>
<script src="js/plugins-events.js?v=3.1.0"></script>
<script src="js/plugins-dev.js?v=3.1.0"></script>
<script src="js/plugins-detail.js?v=3.1.0"></script>
<script src="js/plugins-market.js?v=3.1.0"></script>
<script src="js/plugins-exports.js?v=3.1.0"></script>
<script src="js/dex-agent-state.js?v=3.1.0"></script>
<script src="js/dex-render-markdown.js?v=3.1.0"></script>
<script src="js/dex-assistant.js?v=3.1.0"></script>
<script src="js/dex-assistant-messages.js?v=3.1.0"></script>
<script src="js/dex-assistant-attachments.js?v=3.1.0"></script>
<script src="js/dex-assistant-search.js?v=3.1.0"></script>
<script src="js/dex-assistant-shortcuts.js?v=3.1.0"></script>
<script src="js/placeholder-pages.js?v=3.1.0"></script>
<script src="js/app-shell.js?v=3.1.0"></script>
<script src="js/startup.js?v=3.1.0"></script>
</body>
</html>
